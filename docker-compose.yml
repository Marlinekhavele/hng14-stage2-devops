services:
  redis:
    image: ${REDIS_IMAGE:-redis:7}
    env_file:
      - .env
    networks:
      - ${APP_NETWORK}
    restart: ${RESTART_POLICY}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-5s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT}"
          memory: ${REDIS_MEMORY_LIMIT}

  api:
    build:
      context: ./api
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ${APP_NETWORK}
    ports:
      - "${API_PORT}:${API_PORT}"
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT}"
          memory: ${API_MEMORY_LIMIT}

  worker:
    build:
      context: ./worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ${APP_NETWORK}
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT}"
          memory: ${WORKER_MEMORY_LIMIT}

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ${APP_NETWORK}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT}"
          memory: ${FRONTEND_MEMORY_LIMIT}

networks:
  ${APP_NETWORK}:
    driver: bridge